<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance — HTML Testing</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        #root { padding: 2rem; display: flex; justify-content: center; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script src="shared.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const fmt = n => "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fmtCompact = n => n >= 1e6 ? "$" + (n / 1e6).toFixed(1) + "M" : n >= 1e3 ? "$" + (n / 1e3).toFixed(0) + "K" : "$" + n.toFixed(0);
        const th = { padding: "8px 12px", textAlign: "right", fontWeight: 600, whiteSpace: "nowrap" };
        const td = { padding: "7px 12px", textAlign: "right", borderBottom: "1px solid #2a2a3e" };

        // Quarterly-compounded projection (contribute monthly, interest credited
        // each quarter) — pure so what-if scenarios can reuse it
        function simulate(initial, monthly, annual, years) {
          const qRate = annual / 100 / 4;
          const quarters = [];
          let balance = initial;
          for (let q = 1; q <= years * 4; q++) {
            balance += monthly * 3;
            const interest = balance * qRate;
            balance += interest;
            quarters.push({
              q, year: Math.ceil(q / 4), qInYear: ((q - 1) % 4) + 1,
              contributions: initial + q * monthly * 3,
              interest: parseFloat(interest.toFixed(2)),
              balance: parseFloat(balance.toFixed(2)),
            });
          }
          const yearlyData = [];
          for (let y = 1; y <= years; y++) {
            const qs = quarters.filter(q => q.year === y);
            const lastQ = qs[qs.length - 1];
            yearlyData.push({
              year: y,
              contributed: lastQ.contributions,
              totalInterest: parseFloat((lastQ.balance - lastQ.contributions).toFixed(2)),
              yearInterest: parseFloat(qs.reduce((s, q) => s + q.interest, 0).toFixed(2)),
              balance: lastQ.balance,
            });
          }
          return { quarters, yearlyData };
        }

        function MRow({ emoji, title, value, sub, color }) {
          return (
            <div style={{ display: "flex", gap: 8, alignItems: "baseline", padding: "4px 0", fontSize: 13 }}>
              <span style={{ flexShrink: 0 }}>{emoji}</span>
              <span style={{ color: "#9ca3af", flex: 1 }}>{title}</span>
              <span style={{ textAlign: "right" }}>
                <span style={{ color: color || "#e0e0e0", fontWeight: 700, whiteSpace: "nowrap" }}>{value}</span>
                {sub && <div style={{ color: "#555", fontSize: 11 }}>{sub}</div>}
              </span>
            </div>
          );
        }

        function Field({ label, value, onChange, min, max, prefix, suffix }) {
          const [local, setLocal] = useState(String(value));

          // Keep the display in sync when the committed value differs
          // (e.g. after clamping to min/max)
          useEffect(() => { setLocal(String(value)); }, [value]);

          const commit = () => {
            const n = parseFloat(local);
            if (!isNaN(n)) {
              const clamped = Math.max(min, Math.min(max, n));
              onChange(clamped);
              setLocal(String(clamped));
            } else {
              setLocal(String(value));
            }
          };

          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 1, minWidth: 130 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#9ca3af" }}>{label}</label>
              <div style={{ display: "flex", alignItems: "center", background: "#1a1a2e", border: "2px solid #4f46e5", borderRadius: 8, padding: "8px 10px", gap: 4 }}>
                {prefix && <span style={{ color: "#9ca3af", fontWeight: 600 }}>{prefix}</span>}
                <input
                  type="number" inputMode="decimal"
                  value={local}
                  onChange={e => setLocal(e.target.value)}
                  onBlur={commit}
                  onKeyDown={e => e.key === "Enter" && commit()}
                  min={min} max={max}
                  style={{ border: "none", background: "transparent", width: "100%", fontSize: 16, fontWeight: 700, color: "#e0e0e0", outline: "none" }}
                />
                {suffix && <span style={{ color: "#9ca3af", fontWeight: 600 }}>{suffix}</span>}
              </div>
            </div>
          );
        }

        // ── Growth chart (canvas, with hover inspection) ──
        function GrowthChart({ yearlyData, realLine, markers }) {
          const ref = useRef(null);
          const [hover, setHover] = useState(null);
          const W = 660, H = 250;
          const padL = 64, padR = 14, padT = 14, padB = 26;

          useEffect(() => {
            const canvas = ref.current;
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, W, H);
            const n = yearlyData.length;
            if (!n) return;

            const maxV = yearlyData[n - 1].balance || 1;
            const step = n > 1 ? (W - padL - padR) / (n - 1) : 0;
            const x = i => n > 1 ? padL + i * step : (padL + W - padR) / 2;
            const y = v => padT + (H - padT - padB) * (1 - v / maxV);

            // Horizontal gridlines + labels
            ctx.font = "10px monospace";
            ctx.textAlign = "right";
            for (let g = 0; g <= 4; g++) {
              const v = (maxV * g) / 4;
              ctx.strokeStyle = "#1e1e35";
              ctx.lineWidth = 1;
              ctx.beginPath(); ctx.moveTo(padL, y(v)); ctx.lineTo(W - padR, y(v)); ctx.stroke();
              ctx.fillStyle = "#666";
              ctx.fillText(fmtCompact(v), padL - 6, y(v) + 3);
            }
            // Year labels (first, middle, last)
            ctx.textAlign = "center";
            [0, Math.floor((n - 1) / 2), n - 1].forEach(i => {
              if (i < 0) return;
              ctx.fillStyle = "#666";
              ctx.fillText("Y" + yearlyData[i].year, x(i), H - 8);
            });
            ctx.textAlign = "left";

            // Contributions area
            ctx.beginPath();
            ctx.moveTo(x(0), y(0));
            yearlyData.forEach((r, i) => ctx.lineTo(x(i), y(r.contributed)));
            ctx.lineTo(x(n - 1), y(0));
            ctx.closePath();
            ctx.fillStyle = "rgba(102, 126, 234, 0.22)";
            ctx.fill();
            ctx.beginPath();
            yearlyData.forEach((r, i) => i === 0 ? ctx.moveTo(x(i), y(r.contributed)) : ctx.lineTo(x(i), y(r.contributed)));
            ctx.strokeStyle = "#667eea";
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Balance line
            ctx.beginPath();
            yearlyData.forEach((r, i) => i === 0 ? ctx.moveTo(x(i), y(r.balance)) : ctx.lineTo(x(i), y(r.balance)));
            ctx.strokeStyle = "#10b981";
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Inflation-adjusted balance ("today's money")
            if (realLine) {
              ctx.beginPath();
              ctx.setLineDash([6, 4]);
              realLine.forEach((v, i) => i === 0 ? ctx.moveTo(x(i), y(v)) : ctx.lineTo(x(i), y(v)));
              ctx.strokeStyle = "#f59e0b";
              ctx.lineWidth = 1.5;
              ctx.stroke();
              ctx.setLineDash([]);
            }

            // Milestone markers
            (markers || []).forEach((m, k) => {
              if (m.index < 0 || m.index >= n) return;
              const mx = x(m.index);
              ctx.setLineDash([2, 3]);
              ctx.strokeStyle = m.color + "88";
              ctx.lineWidth = 1;
              ctx.beginPath(); ctx.moveTo(mx, padT + 16); ctx.lineTo(mx, H - padB); ctx.stroke();
              ctx.setLineDash([]);
              ctx.font = "11px monospace";
              ctx.textAlign = "center";
              ctx.fillText(m.emoji, mx, padT + 10 + (k % 2) * 13);
              ctx.textAlign = "left";
            });

            // Hover crosshair + tooltip
            if (hover !== null && yearlyData[hover]) {
              const r = yearlyData[hover];
              const hx = x(hover);
              ctx.setLineDash([4, 4]);
              ctx.strokeStyle = "#555";
              ctx.lineWidth = 1;
              ctx.beginPath(); ctx.moveTo(hx, padT); ctx.lineTo(hx, H - padB); ctx.stroke();
              ctx.setLineDash([]);
              const dots = [[r.balance, "#10b981"], [r.contributed, "#667eea"]];
              if (realLine) dots.push([realLine[hover], "#f59e0b"]);
              dots.forEach(([v, c]) => {
                ctx.beginPath(); ctx.arc(hx, y(v), 4, 0, Math.PI * 2);
                ctx.fillStyle = c; ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke();
              });
              const lines = [
                { t: "Year " + r.year, c: "#c4b5fd" },
                { t: "Balance:  " + fmt(r.balance), c: "#10b981" },
                { t: "Invested: " + fmt(r.contributed), c: "#8da2ff" },
                { t: "Interest: " + fmt(r.totalInterest), c: "#9ca3af" },
              ];
              if (realLine) lines.push({ t: "Today's $: " + fmt(realLine[hover]), c: "#f59e0b" });
              ctx.font = "11px monospace";
              const bw = Math.max(...lines.map(l => ctx.measureText(l.t).width)) + 16;
              const bh = lines.length * 15 + 10;
              const bx = hx + bw + 12 > W - padR ? hx - bw - 12 : hx + 12;
              const by = padT + 4;
              ctx.fillStyle = "rgba(13, 13, 26, 0.95)";
              ctx.strokeStyle = "#3a3a5e";
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.roundRect ? ctx.roundRect(bx, by, bw, bh, 6) : ctx.rect(bx, by, bw, bh);
              ctx.fill(); ctx.stroke();
              lines.forEach((l, i) => {
                ctx.fillStyle = l.c;
                ctx.fillText(l.t, bx + 8, by + 18 + i * 15);
              });
            }
          }, [yearlyData, hover, realLine, markers]);

          const onMove = e => {
            const rect = ref.current.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (W / rect.width);
            const n = yearlyData.length;
            if (n < 2) { setHover(n ? 0 : null); return; }
            const i = Math.round((mx - padL) / ((W - padL - padR) / (n - 1)));
            setHover(Math.max(0, Math.min(n - 1, i)));
          };

          return (
            <div style={{ background: "#161625", border: "1px solid #2a2a3e", borderRadius: 10, padding: "12px 14px 6px", marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 14, fontSize: 11, color: "#9ca3af", fontWeight: 600, marginBottom: 6, flexWrap: "wrap" }}>
                <span><span style={{ color: "#10b981" }}>━</span> Balance</span>
                <span><span style={{ color: "#667eea" }}>▰</span> Contributions</span>
                {realLine && <span><span style={{ color: "#f59e0b" }}>┅</span> Today's money</span>}
                {(markers || []).map(m => (
                  <span key={m.emoji} style={{ color: "#777" }}>{m.emoji} {m.short}</span>
                ))}
                <span style={{ marginLeft: "auto", color: "#555", fontWeight: 400 }}>hover to inspect</span>
              </div>
              <canvas
                ref={ref} width={W} height={H}
                style={{ width: "100%", maxWidth: W, display: "block", cursor: "crosshair" }}
                onMouseMove={onMove}
                onMouseLeave={() => setHover(null)}
              />
            </div>
          );
        }

        // Restore last session's inputs (if any)
        const SAVED = (() => {
          try { return JSON.parse(localStorage.getItem("ht-finance")) || {}; }
          catch (e) { return {}; }
        })();

        function App() {
          const [monthly, setMonthly] = useState(SAVED.monthly ?? 500);
          const [annual, setAnnual] = useState(SAVED.annual ?? 9);
          const [years, setYears] = useState(SAVED.years ?? 20);
          const [initial, setInitial] = useState(SAVED.initial ?? 0);
          const [inflation, setInflation] = useState(SAVED.inflation ?? 0);
          const [view, setView] = useState("yearly");

          useEffect(() => {
            try { localStorage.setItem("ht-finance", JSON.stringify({ monthly, annual, years, initial, inflation })); }
            catch (e) { /* storage unavailable */ }
          }, [monthly, annual, years, initial, inflation]);

          const { quarters, yearlyData } = useMemo(
            () => simulate(initial, monthly, annual, years),
            [monthly, annual, years, initial]
          );

          const last = quarters[quarters.length - 1];

          // ── Milestones ──
          const milestones = useMemo(() => {
            // The point where interest earned matches every dollar you put in
            const gainBack = quarters.find(q => q.balance - q.contributions >= q.contributions) || null;
            // The year your money starts out-earning your own deposits
            const crossover = yearlyData.find(r => r.yearInterest >= monthly * 12) || null;
            const thresholds = [10e3, 25e3, 50e3, 100e3, 250e3, 500e3, 1e6, 2e6, 5e6, 10e6];
            const reached = thresholds
              .filter(t => t > initial && t <= last.balance)
              .map(t => ({ t, q: quarters.find(q => q.balance >= t) }))
              .slice(-4);
            const next = thresholds.find(t => t > last.balance) || null;
            return { gainBack, crossover, reached, next };
          }, [quarters, yearlyData, monthly, initial, last]);

          // ── What moves the needle ──
          const levers = useMemo(() => {
            const finalOf = (i, m, a, y) => {
              const d = simulate(i, m, a, y);
              return d.quarters[d.quarters.length - 1].balance;
            };
            const base = last.balance;
            return [
              { label: "+$100 / month", delta: finalOf(initial, monthly + 100, annual, years) - base },
              { label: "+1% return", delta: finalOf(initial, monthly, annual + 1, years) - base },
              { label: "+5 more years", delta: finalOf(initial, monthly, annual, Math.min(years + 5, 55)) - base },
            ].map(l => ({ ...l, pct: base > 0 ? (l.delta / base) * 100 : 0 }));
          }, [initial, monthly, annual, years, last]);

          // ── Inflation adjustment ──
          const inflOn = inflation > 0;
          const realLine = inflOn
            ? yearlyData.map(r => r.balance / Math.pow(1 + inflation / 100, r.year))
            : null;
          const realFinal = inflOn ? realLine[realLine.length - 1] : null;

          const chartMarkers = [];
          if (milestones.crossover) chartMarkers.push({ index: milestones.crossover.year - 1, emoji: "⚡", color: "#f59e0b", short: "interest > deposits" });
          if (milestones.gainBack) chartMarkers.push({ index: milestones.gainBack.year - 1, emoji: "💰", color: "#ec4899", short: "gains = invested" });

          const fmtWhen = q => q ? `Year ${q.year}` + (q.qInYear > 1 ? `, Q${q.qInYear}` : "") : `not within ${years} yrs`;

          const exportCSV = () => {
            const rows = view === "yearly"
              ? [["Year", "Total Invested", "Interest This Year", "Total Interest", "Balance", ...(inflOn ? ["Todays Money"] : [])],
                 ...yearlyData.map((r, i) => [r.year, r.contributed, r.yearInterest, r.totalInterest, r.balance, ...(inflOn ? [realLine[i].toFixed(2)] : [])])]
              : [["Quarter", "Year", "Total Invested", "Interest Earned", "Balance"],
                 ...quarters.map(r => [`Q${r.qInYear}`, r.year, r.contributions, r.interest, r.balance])];
            const csv = rows.map(r => r.join(",")).join("\n");
            const blob = new Blob([csv], { type: "text/csv" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `investment_${years}yr_${annual}pct.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
            window.htToast && window.htToast("📥 CSV downloaded");
          };

          return (
            <div style={{ fontFamily: "sans-serif", padding: 16, maxWidth: 700, width: "100%" }}>
              <h2 style={{ marginBottom: 4, color: "#e0e0e0" }}>📈 Investment Calculator</h2>
              <p style={{ color: "#666", marginBottom: 16, fontSize: 14 }}>Compound interest with regular contributions</p>

              {/* Controls */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10, padding: 14, background: "#161625", borderRadius: 10, marginBottom: 16, border: "1px solid #2a2a3e" }}>
                <Field label="Starting Amount" value={initial} onChange={setInitial} min={0} max={10000000} prefix="$" />
                <Field label="Monthly Investment" value={monthly} onChange={setMonthly} min={1} max={100000} prefix="$" />
                <Field label="Annual Return" value={annual} onChange={setAnnual} min={0.1} max={50} suffix="%" />
                <Field label="Years" value={years} onChange={setYears} min={1} max={50} suffix="yrs" />
                <Field label="Inflation (0 = off)" value={inflation} onChange={setInflation} min={0} max={20} suffix="%" />
              </div>

              {/* Summary */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                {[
                  { label: "Total Invested", val: fmt(last.contributions), color: "#667eea" },
                  { label: "Interest Earned", val: fmt(last.balance - last.contributions), color: "#10b981" },
                  { label: "Final Balance", val: fmt(last.balance), color: "#f43f5e" },
                  ...(inflOn ? [{ label: `In Today's Money (${inflation}% infl.)`, val: fmt(realFinal), color: "#f59e0b" }] : []),
                ].map(s => (
                  <div key={s.label} style={{ flex: 1, minWidth: 130, padding: "10px 14px", background: "#111", borderRadius: 8, borderTop: `3px solid ${s.color}` }}>
                    <div style={{ fontSize: 11, color: "#9ca3af", fontWeight: 600 }}>{s.label}</div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: s.color }}>{s.val}</div>
                  </div>
                ))}
              </div>

              {/* Growth chart */}
              <GrowthChart yearlyData={yearlyData} realLine={realLine} markers={chartMarkers} />

              {/* Milestones + levers */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "stretch" }}>
                <div style={{ flex: "1 1 320px", background: "#161625", border: "1px solid #2a2a3e", borderRadius: 10, padding: "12px 14px" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#c4b5fd", marginBottom: 6 }}>🏁 Milestones</div>
                  <MRow emoji="💰" title="Gains equal everything you invested"
                    value={fmtWhen(milestones.gainBack)}
                    color={milestones.gainBack ? "#ec4899" : "#666"}
                    sub={milestones.gainBack
                      ? `${fmtCompact(milestones.gainBack.contributions)} in, ${fmtCompact(milestones.gainBack.balance - milestones.gainBack.contributions)} earned`
                      : "raise deposits, return or time"} />
                  <MRow emoji="⚡" title="Interest out-earns your deposits"
                    value={milestones.crossover ? `Year ${milestones.crossover.year}` : `not within ${years} yrs`}
                    color={milestones.crossover ? "#f59e0b" : "#666"}
                    sub={milestones.crossover
                      ? `${fmtCompact(milestones.crossover.yearInterest)}/yr vs ${fmtCompact(monthly * 12)}/yr deposited`
                      : null} />
                  <MRow emoji="🕰️" title="Doubling time (Rule of 72)"
                    value={`≈ ${(72 / annual).toFixed(1)} yrs`}
                    sub={`at ${annual}% annual return`} />
                  {milestones.reached.map(({ t, q }) => (
                    <MRow key={t} emoji="🎯" title={`Balance hits ${fmtCompact(t)}`} value={fmtWhen(q)} color="#10b981" />
                  ))}
                  {milestones.next && (
                    <MRow emoji="🔮" title={`Next stop: ${fmtCompact(milestones.next)}`}
                      value={`not within ${years} yrs`} color="#666" />
                  )}
                </div>
                <div style={{ flex: "1 1 240px", background: "#161625", border: "1px solid #2a2a3e", borderRadius: 10, padding: "12px 14px" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#c4b5fd", marginBottom: 6 }}>🧪 What moves the needle</div>
                  {levers.map(l => (
                    <MRow key={l.label} emoji="↗" title={l.label}
                      value={`+${fmtCompact(l.delta)}`} color="#10b981"
                      sub={`+${l.pct.toFixed(1)}% vs current plan`} />
                  ))}
                  <div style={{ color: "#555", fontSize: 11, marginTop: 6 }}>
                    Each tweak applied alone to your current {fmtCompact(last.balance)} plan
                  </div>
                </div>
              </div>

              {/* View toggle + export */}
              <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center" }}>
                {["yearly", "quarterly"].map(v => (
                  <button key={v} onClick={() => setView(v)} style={{
                    padding: "6px 16px", borderRadius: 6, border: "none", cursor: "pointer",
                    background: view === v ? "#4f46e5" : "#222",
                    color: view === v ? "#fff" : "#888", fontWeight: 600,
                    transition: "all 0.2s"
                  }}>{v.charAt(0).toUpperCase() + v.slice(1)}</button>
                ))}
                <button onClick={exportCSV} style={{
                  marginLeft: "auto", padding: "6px 16px", borderRadius: 6, cursor: "pointer",
                  background: "transparent", border: "1px solid #4f46e5", color: "#8da2ff",
                  fontWeight: 600, transition: "all 0.2s"
                }}>📥 Export CSV</button>
              </div>

              {/* Table */}
              <div style={{ overflowX: "auto", borderRadius: 8, border: "1px solid #2a2a3e" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                  <thead>
                    <tr style={{ background: "#4f46e5", color: "#fff" }}>
                      {view === "yearly"
                        ? <><th style={th}>Year</th><th style={th}>Total Invested</th><th style={th}>Interest This Year</th><th style={th}>Total Interest</th><th style={th}>Balance</th></>
                        : <><th style={th}>Quarter</th><th style={th}>Total Invested</th><th style={th}>Interest Earned</th><th style={th}>Balance</th></>}
                    </tr>
                  </thead>
                  <tbody>
                    {view === "yearly"
                      ? yearlyData.map((row, i) => (
                        <tr key={row.year} style={{ background: i % 2 === 0 ? "#0f0f1a" : "#141425" }}>
                          <td style={td}><strong style={{ color: "#c4b5fd" }}>Year {row.year}</strong></td>
                          <td style={td}>{fmt(row.contributed)}</td>
                          <td style={{ ...td, color: "#10b981" }}>{fmt(row.yearInterest)}</td>
                          <td style={{ ...td, color: "#10b981" }}>{fmt(row.totalInterest)}</td>
                          <td style={{ ...td, fontWeight: 700, color: "#f59e0b" }}>{fmt(row.balance)}</td>
                        </tr>
                      ))
                      : quarters.map((row, i) => (
                        <tr key={row.q} style={{ background: i % 2 === 0 ? "#0f0f1a" : "#141425" }}>
                          <td style={td}><span style={{ color: "#c4b5fd" }}>Y{row.year} Q{row.qInYear}</span></td>
                          <td style={td}>{fmt(row.contributions)}</td>
                          <td style={{ ...td, color: "#10b981" }}>{fmt(row.interest)}</td>
                          <td style={{ ...td, fontWeight: 700, color: "#f59e0b" }}>{fmt(row.balance)}</td>
                        </tr>
                      ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
