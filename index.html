<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive tools for game dev: math visualizers, perf calculators, noise, colors, shaders, bitwise tricks, probability and finance.">
    <title>EruBay's HTML Testing</title>
    <link rel="stylesheet" href="shared.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script src="shared.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const pages = [
            { icon: "📐", title: "Game Math", desc: "Lerp, vectors, projectiles, steering — formulas you use daily in Godot", color: "#667eea", tags: ["lerp", "vectors", "projectiles", "steering", "distance"], href: "math.html", demos: 5 },
            { icon: "⚙️", title: "Perf Tools", desc: "Frame budgets, VRAM estimates, LOD & chunk calculators", color: "#10b981", tags: ["FPS budget", "VRAM", "LOD", "chunks", "draw calls"], href: "perf.html", demos: 5 },
            { icon: "🌊", title: "Noise Lab", desc: "Interactive Perlin noise with presets, color modes & PNG/Godot export", color: "#f59e0b", tags: ["perlin", "octaves", "terrain", "procedural"], href: "noise.html", demos: 1 },
            { icon: "🎨", title: "Colors", desc: "Picker, palette generator, contrast checker, gradient builder", color: "#ec4899", tags: ["picker", "palettes", "WCAG", "gradients", "Godot Color()"], href: "colors.html", demos: 5 },
            { icon: "✨", title: "Shaders", desc: "SDF visualizer, UV patterns, shader functions & normal maps", color: "#a855f7", tags: ["SDF", "UV", "smoothstep", "GLSL", "normal maps"], href: "shaders.html", demos: 5 },
            { icon: "🔢", title: "Bitwise", desc: "Bit flags, bitmasks, binary ops & optimization tricks", color: "#14b8a6", tags: ["flags", "masks", "binary", "GDScript", "optimization"], href: "bitwise.html", demos: 6 },
            { icon: "🎲", title: "Random", desc: "Drop chance math, loot table simulator & dice distributions", color: "#f97316", tags: ["RNG", "loot", "dice", "probability"], href: "random.html", demos: 3 },
            { icon: "💰", title: "Finance", desc: "Compound interest with growth chart & CSV export", color: "#f43f5e", tags: ["compound interest", "ROI", "projections"], href: "finance.html", demos: 1 },
        ];
        const totalDemos = pages.reduce((s, p) => s + p.demos, 0);

        function Particle({ delay }) {
            const style = {
                position: "absolute",
                width: 4, height: 4,
                borderRadius: "50%",
                background: `hsl(${Math.random() * 60 + 230}, 80%, 65%)`,
                left: `${Math.random() * 100}%`,
                top: `${Math.random() * 100}%`,
                opacity: 0,
                animation: `float ${3 + Math.random() * 4}s ease-in-out ${delay}s infinite`,
            };
            return <div style={style} />;
        }

        function Card({ icon, title, desc, color, tags, href, index }) {
            const [hovered, setHovered] = useState(false);
            const [clicked, setClicked] = useState(false);

            const cardStyle = {
                background: hovered ? "#1e1e3a" : "#1a1a2e",
                border: `1px solid ${hovered ? color : "#333"}`,
                borderRadius: 14,
                padding: "1.8rem 1.5rem",
                cursor: "pointer",
                transition: "all 0.3s cubic-bezier(.4,0,.2,1)",
                transform: hovered ? "translateY(-6px) scale(1.02)" : clicked ? "scale(0.97)" : "translateY(0)",
                boxShadow: hovered ? `0 12px 40px ${color}22` : "none",
                position: "relative",
                overflow: "hidden",
                opacity: 0,
                animation: `fadeSlideUp 0.5s ease ${index * 0.1}s forwards`,
                textDecoration: "none",
                color: "inherit",
                display: "block",
            };

            const glowStyle = {
                position: "absolute",
                top: 0, left: 0, right: 0,
                height: 3,
                background: `linear-gradient(90deg, transparent, ${color}, transparent)`,
                opacity: hovered ? 1 : 0,
                transition: "opacity 0.3s",
            };

            const iconStyle = {
                fontSize: 36,
                marginBottom: 12,
                display: "inline-block",
                transition: "transform 0.3s",
                transform: hovered ? "scale(1.2) rotate(-5deg)" : "scale(1)",
            };

            const content = (
                <div
                    style={cardStyle}
                    onMouseEnter={() => setHovered(true)}
                    onMouseLeave={() => { setHovered(false); setClicked(false); }}
                    onMouseDown={() => setClicked(true)}
                    onMouseUp={() => setClicked(false)}
                >
                    <div style={glowStyle} />
                    <div style={iconStyle}>{icon}</div>
                    <h3 style={{ color, marginBottom: 6, fontSize: 18, fontWeight: 700 }}>{title}</h3>
                    <p style={{ color: "#888", fontSize: 14, marginBottom: 12, lineHeight: 1.4 }}>{desc}</p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                        {tags.map(t => (
                            <span key={t} style={{
                                fontSize: 11, padding: "3px 8px", borderRadius: 6,
                                background: `${color}15`, color: `${color}cc`, fontWeight: 600,
                                border: `1px solid ${color}25`,
                            }}>{t}</span>
                        ))}
                    </div>
                </div>
            );

            if (href) return <a href={href} style={{ textDecoration: "none", color: "inherit" }}>{content}</a>;
            return content;
        }

        function TypeWriter({ text, speed = 60 }) {
            const [displayed, setDisplayed] = useState("");
            const [done, setDone] = useState(false);
            useEffect(() => {
                let i = 0;
                const timer = setInterval(() => {
                    i++;
                    setDisplayed(text.slice(0, i));
                    if (i >= text.length) { clearInterval(timer); setDone(true); }
                }, speed);
                return () => clearInterval(timer);
            }, [text, speed]);
            return (
                <span>
                    {displayed}
                    <span style={{
                        borderRight: "2px solid #667eea",
                        marginLeft: 2,
                        animation: done ? "blink 1s step-end infinite" : "none",
                    }}>&nbsp;</span>
                </span>
            );
        }

        function Stats() {
            const [count, setCount] = useState(0);
            const target = pages.length;
            useEffect(() => {
                if (count < target) {
                    const t = setTimeout(() => setCount(c => c + 1), 200);
                    return () => clearTimeout(t);
                }
            }, [count, target]);

            const stats = [
                { label: "Tools", value: count, color: "#667eea" },
                { label: "Interactive Demos", value: Math.round(totalDemos * (count / target)), color: "#10b981" },
                { label: "Efficiency", value: "∞", color: "#f59e0b" },
            ];

            return (
                <div style={{ display: "flex", gap: 16, marginBottom: 32, flexWrap: "wrap", justifyContent: "center" }}>
                    {stats.map(s => (
                        <div key={s.label} style={{
                            padding: "10px 24px", background: "#111", borderRadius: 10,
                            borderLeft: `3px solid ${s.color}`, minWidth: 120,
                            opacity: 0, animation: "fadeSlideUp 0.5s ease 0.3s forwards",
                        }}>
                            <div style={{ fontSize: 22, fontWeight: 800, color: s.color }}>{s.value}</div>
                            <div style={{ fontSize: 11, color: "#666", fontWeight: 600 }}>{s.label}</div>
                        </div>
                    ))}
                </div>
            );
        }

        function SearchBox({ query, setQuery }) {
            const [focused, setFocused] = useState(false);
            return (
                <div style={{
                    display: "flex", alignItems: "center", gap: 8,
                    background: "#14142a",
                    border: `1px solid ${focused ? "#667eea" : "#2a2a4a"}`,
                    borderRadius: 10, padding: "9px 14px",
                    width: "100%", maxWidth: 420, marginBottom: 28,
                    transition: "border-color 0.2s, box-shadow 0.2s",
                    boxShadow: focused ? "0 0 0 3px #667eea22" : "none",
                    opacity: 0, animation: "fadeSlideUp 0.5s ease 0.4s forwards",
                }}>
                    <span style={{ color: "#555", fontSize: 14 }}>🔍</span>
                    <input
                        value={query}
                        onChange={e => setQuery(e.target.value)}
                        onFocus={() => setFocused(true)}
                        onBlur={() => setFocused(false)}
                        placeholder="Filter tools… (or press Ctrl+K anywhere)"
                        style={{
                            flex: 1, background: "transparent", border: "none", outline: "none",
                            color: "#e0e0e0", fontSize: 14, fontFamily: "inherit",
                        }}
                    />
                    {query && (
                        <span
                            onClick={() => setQuery("")}
                            style={{ color: "#666", cursor: "pointer", fontSize: 13, padding: "0 2px" }}
                            title="Clear"
                        >✕</span>
                    )}
                </div>
            );
        }

        function App() {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [query, setQuery] = useState("");

            const q = query.trim().toLowerCase();
            const visible = pages.filter(p =>
                !q || (p.title + " " + p.desc + " " + p.tags.join(" ")).toLowerCase().includes(q)
            );

            return (
                <div
                    style={{
                        flex: 1, display: "flex", flexDirection: "column",
                        alignItems: "center", justifyContent: "center",
                        padding: "3rem 2rem", position: "relative", overflow: "hidden",
                    }}
                    onMouseMove={e => setMousePos({ x: e.clientX, y: e.clientY })}
                >
                    {/* Animated background */}
                    <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" }}>
                        {Array.from({ length: 20 }, (_, i) => <Particle key={i} delay={i * 0.3} />)}
                        <div style={{
                            position: "absolute",
                            width: 400, height: 400,
                            borderRadius: "50%",
                            background: "radial-gradient(circle, #667eea08, transparent 70%)",
                            left: mousePos.x - 200, top: mousePos.y - 200,
                            transition: "left 0.3s ease, top 0.3s ease",
                            pointerEvents: "none",
                        }} />
                    </div>

                    {/* Title */}
                    <h1 style={{
                        fontSize: "clamp(2rem, 5vw, 3.5rem)",
                        background: "linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ec4899 100%)",
                        backgroundSize: "200% 200%",
                        animation: "gradientShift 4s ease infinite",
                        WebkitBackgroundClip: "text",
                        WebkitTextFillColor: "transparent",
                        marginBottom: 8,
                        position: "relative",
                    }}>
                        🧪 HTML Testing
                    </h1>

                    <p style={{
                        color: "#888", fontSize: "1.1rem", marginBottom: 24,
                        maxWidth: 500, lineHeight: 1.5,
                    }}>
                        <TypeWriter text="Interactive tools for game dev, shaders, performance & more" speed={40} />
                    </p>

                    <Stats />

                    <SearchBox query={query} setQuery={setQuery} />

                    {/* Cards grid */}
                    <div style={{
                        display: "grid",
                        gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))",
                        gap: 16,
                        maxWidth: 900,
                        width: "100%",
                        position: "relative",
                    }}>
                        {visible.map((p, i) => <Card key={p.title} {...p} index={i} />)}
                    </div>
                    {visible.length === 0 && (
                        <div style={{ color: "#555", padding: "2rem", fontSize: 15 }}>
                            No tools match “{query}” — try another keyword
                        </div>
                    )}

                    <footer style={{
                        marginTop: 48, color: "#333", fontSize: 13,
                        opacity: 0, animation: "fadeSlideUp 0.5s ease 0.8s forwards",
                        textAlign: "center", lineHeight: 1.8,
                    }}>
                        Built with ☕ by EruBay
                        <br />
                        <span style={{ color: "#2a2a3e" }}>
                            Tip: <kbd style={{ background: "#14142a", border: "1px solid #2a2a4a", borderRadius: 4, padding: "1px 6px", fontFamily: "monospace" }}>Ctrl K</kbd> opens the quick switcher on any page · double-click code blocks to copy
                        </span>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>

    <style>
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { opacity: 0; transform: translateY(0); }
            50% { opacity: 0.6; transform: translateY(-30px); }
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</body>
</html>
