<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EruBay's HTML Testing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 2rem;
            background: #111;
            border-bottom: 1px solid #222;
        }
        nav a {
            color: #888;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: #667eea; }
        nav .logo { font-size: 1.2rem; color: #e0e0e0; font-weight: 800; }
        .container {
            text-align: center;
            padding: 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        p {
            color: #888;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #667eea;
        }
        .card h3 { color: #667eea; margin-bottom: 0.5rem; }
        .card p { color: #666; font-size: 0.9rem; margin-bottom: 0; }
        footer {
            margin-top: 3rem;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🧪 HTML Testing</span>
        <a href="index.html" class="active">Home</a>
        <a href="calculators.html">Calculators</a>
    </nav>
    <div class="container">
        <h1>🧪 HTML Testing</h1>
        <p>EruBay's playground for HTML/CSS/JS experiments</p>
        <div class="grid">
            <div class="card">
                <h3>🎨 CSS</h3>
                <p>Layouts, animations, gradients</p>
            </div>
            <div class="card">
                <h3>⚡ JavaScript</h3>
                <p>DOM, APIs, interactive demos</p>
            </div>
            <div class="card">
                <h3>🎮 Canvas</h3>
                <p>2D/3D graphics experiments</p>
            </div>
            <a href="calculators.html" style="text-decoration:none;color:inherit">
                <div class="card">
                    <h3>🧮 Calculators</h3>
                    <p>Investment & financial tools</p>
                </div>
            </a>
        </div>
        <footer>Built with ☕ by EruBay</footer>
    </div>
</body>
</html>
